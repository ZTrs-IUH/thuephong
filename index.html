<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cao Thiên Properties - Hệ Thống Phòng Trọ Uy Tín</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .room-card { transition: transform 0.2s, box-shadow 0.2s; }
        .room-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .badge-service { background: #f8fafc; border: 1px solid #e2e8f0; padding: 2px 8px; border-radius: 6px; font-size: 11px; color: #64748b; }
    </style>
</head>
<body class="text-slate-900">

    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div onclick="showHome()" class="flex items-center cursor-pointer">
                <img src="logo.png" alt="Logo" class="h-10 w-auto mr-3" onerror="this.src='https://via.placeholder.com/40'">
                <span class="font-black text-xl text-blue-600 tracking-tight italic uppercase">Cao Thiên</span>
            </div>
            <a href="https://zalo.me/0987848390" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-full font-bold text-sm transition shadow-md">Liên hệ Zalo</a>
        </div>
    </nav>

    <header class="bg-white border-b border-slate-200 py-8 px-4">
        <div class="max-w-4xl mx-auto text-center">
            <h1 class="text-2xl md:text-4xl font-extrabold text-slate-800 mb-4">Tìm phòng trọ mơ ước của bạn</h1>
            <div class="flex flex-wrap justify-center gap-3 mt-6" id="districtFilter">
                </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-10">
        <div class="flex justify-between items-center mb-8">
            <h2 id="sectionTitle" class="text-xl font-bold text-slate-800">Tất cả phòng mới nhất</h2>
            <div class="text-sm text-slate-500" id="roomCount">Đang tải...</div>
        </div>
        
        <div id="roomGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            </div>
    </main>

    <div id="serviceModal" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-3xl overflow-hidden shadow-2xl scale-in">
            <div class="p-6">
                <div class="flex justify-between items-start mb-4">
                    <h3 id="modalAddr" class="font-bold text-lg leading-tight">Địa chỉ phòng</h3>
                    <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 text-2xl">&times;</button>
                </div>
                <div class="space-y-3" id="modalDetail"></div>
                <button onclick="window.location.href='tel:0987848390'" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl mt-6 flex items-center justify-center gap-2">
                    <i class="fa-solid fa-phone"></i> Gọi tư vấn ngay
                </button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
